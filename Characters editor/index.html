<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Characters editor</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">

      <h1>RPG Character Editor</h1>
      <div class="top-bar">
         <h2 id="gold"></h2>
         <button id="addGold">+100 Gold</button>
      </div>

      <label>Name</label>
      <input id="name">


      <button id="generateBtn">
         Generate
      </button>

      <div id="character">
         <hr>
         <h2>Characters list</h2>
         <hr>
         <div id="list">
            <div id="heroCards"></div>
            <div id="heroInfo"></div>
         </div>
      </div>
   </div>
   <template class="hero-card-template">
      <img src="" id="hero-img">
      <h3 id="hero-name"></h3>
      <p id="hero-class"></p>
      <p class="hero-HP">HP: <span id="hero-current-HP"></span>/<span id="hero-max-HP"></span></p>
      <p id="hero-attack">Attack: <span class="hero-current-attack"></span></p>
      <p id="hero-defense">Defense: <span id="hero-current-defense"></span></p>
      <p id="hero-mana">Mana: <span id="hero-current-mana"></span></p>
      <p id="hero-rarity"></p>
      <button class="sell-btn">Продать</button>
      <button class="heal-btn" style="display:none;">Вылечить</button>
   </template>
</body>
<script type="module" src="./app.js"></script>
</html>
