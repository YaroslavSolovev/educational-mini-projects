<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Characters editor</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">

      <h1>RPG Character Editor</h1>
      <div class="top-bar">
         <h2 id="gold"></h2>
         <button id="addGold">+100 Gold</button>
      </div>

      <label>Name</label>
      <input id="name">


      <button id="generateBtn">
         Generate
      </button>

      <div id="character">
         <hr>
         <h2>Characters list</h2>
         <hr>
         <div id="list">
            <div id="heroCards"></div>
            <div id="heroInfo"></div>
         </div>
      </div>
   </div>

</body>
<script src="script.js"></script>
</html>
